{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h3>{% if payment %}Edit Payment{% else %}Add Payment{% endif %}</h3>
    <div class="subtitle">Trip: <strong>{{ trip.lorry_number }}</strong> &middot; {{ trip.date }}</div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header"><i class="bi bi-credit-card me-1"></i> Payment Information</div>
            <div class="card-body">
                <div class="alert alert-success d-flex align-items-center gap-2 mb-4">
                    <i class="bi bi-wallet2"></i>
                    Outstanding balance: <strong>&#8377; {{ "%.2f"|format(trip.balance) }}</strong>
                </div>
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Payment Method <span class="text-danger">*</span></label>
                            <select name="payment_method" class="form-select" required>
                                <option value="NEFT" {% if payment and payment.payment_method == 'NEFT' %}selected{% endif %}>NEFT</option>
                                <option value="RTGS" {% if payment and payment.payment_method == 'RTGS' %}selected{% endif %}>RTGS</option>
                                <option value="CASH" {% if payment and payment.payment_method == 'CASH' %}selected{% endif %}>CASH</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Amount (&#8377;) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">&#8377;</span>
                                <input type="number" step="0.01" min="0" name="amount" class="form-control" value="{{ payment.amount if payment else '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Execution Date <span class="text-danger">*</span></label>
                            <input type="date" name="execution_date" class="form-control" value="{{ payment.execution_date if payment else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Beneficiary Name</label>
                            <input type="text" name="beneficiary_name" class="form-control" value="{{ payment.beneficiary_name if payment else '' }}" placeholder="e.g. Ravi Transport">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Account Number</label>
                            <input type="text" name="account_number" class="form-control" value="{{ payment.account_number if payment else '' }}" placeholder="e.g. 12345678901">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">IFSC Code</label>
                            <input type="text" name="ifsc_code" class="form-control" value="{{ payment.ifsc_code if payment else '' }}" placeholder="e.g. SBIN0001234">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Reference Number</label>
                            <input type="text" name="reference_number" class="form-control" value="{{ payment.reference_number if payment else '' }}" placeholder="e.g. NEFT123456">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> Save</button>
                        <a href="{{ url_for('trips.view', id=trip.id) }}" class="btn btn-outline-secondary"><i class="bi bi-x me-1"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
