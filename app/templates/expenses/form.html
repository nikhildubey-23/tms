{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h3>{% if expense %}Edit Expense{% else %}Add Expense{% endif %}</h3>
    <div class="subtitle">Trip: <strong>{{ trip.lorry_number }}</strong> &middot; {{ trip.date }}</div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><i class="bi bi-receipt me-1"></i> Expense Details</div>
            <div class="card-body">
                <div class="d-flex align-items-center gap-2 mb-4 py-2 px-3 rounded-2" style="background:var(--info-subtle);border-left:4px solid var(--info);">
                    <i class="bi bi-info-circle" style="color:var(--info);"></i>
                    <span style="font-size:.85rem;color:var(--text);">Current balance before expense: <strong>&#8377; {{ "%.2f"|format(trip.balance) }}</strong></span>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Description <span class="text-danger">*</span></label>
                        <input type="text" name="description" class="form-control" value="{{ expense.description if expense else '' }}" placeholder="e.g. Registration Fee" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount (&#8377;) <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text">&#8377;</span>
                            <input type="number" step="0.01" min="0" name="amount" class="form-control" value="{{ expense.amount if expense else '' }}" required>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> Save</button>
                        <a href="{{ url_for('trips.view', id=trip.id) }}" class="btn btn-outline-secondary"><i class="bi bi-x me-1"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
